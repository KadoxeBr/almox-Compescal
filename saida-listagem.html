<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Saídas | COMPESCAL</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#0B0F1A] text-gray-200 min-h-screen">
  <nav class="bg-[#161B28] p-3 flex items-center px-8 border-b border-gray-800 shadow-2xl">
    <button onclick="window.location.href='index.html'" class="mr-4 text-gray-400 hover:text-white transition"><i data-lucide="arrow-left" class="w-5 h-5"></i></button>
    <h1 class="font-bold text-[10px] uppercase tracking-widest text-red-500">Gestão de Saídas de Estoque</h1>
  </nav>

  <main class="p-6 max-w-6xl mx-auto">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
      <button onclick="window.location.href='saida.html'" class="group bg-[#161B28] p-5 rounded-2xl border border-gray-800 hover:border-red-500/50 transition-all shadow-xl text-center">
        <div class="bg-red-500/10 w-10 h-10 rounded-xl flex items-center justify-center mx-auto mb-3 group-hover:scale-110 transition">
          <i data-lucide="file-down" class="text-red-500 w-5 h-5"></i>
        </div>
        <span class="block font-black uppercase text-[8px] tracking-widest text-gray-500">Nova Saída</span>
        <h2 class="text-sm font-bold text-white mt-0.5">Incluir</h2>
      </button>

      <button onclick="window.location.href='saida-alterar.html'" class="group bg-[#161B28] p-5 rounded-2xl border border-gray-800 hover:border-blue-500/50 transition-all shadow-xl text-center">
        <div class="bg-blue-500/10 w-10 h-10 rounded-xl flex items-center justify-center mx-auto mb-3 group-hover:scale-110 transition">
          <i data-lucide="refresh-cw" class="text-blue-500 w-5 h-5"></i>
        </div>
        <span class="block font-black uppercase text-[8px] tracking-widest text-gray-500">Corrigir</span>
        <h2 class="text-sm font-bold text-white mt-0.5">Alterar</h2>
      </button>

      <button onclick="window.location.href='saida-excluir.html'" class="group bg-[#161B28] p-5 rounded-2xl border border-gray-800 hover:border-red-500/50 transition-all shadow-xl text-center">
        <div class="bg-red-500/10 w-10 h-10 rounded-xl flex items-center justify-center mx-auto mb-3 group-hover:scale-110 transition">
          <i data-lucide="trash-2" class="text-red-500 w-5 h-5"></i>
        </div>
        <span class="block font-black uppercase text-[8px] tracking-widest text-gray-500">Remover</span>
        <h2 class="text-sm font-bold text-white mt-0.5">Excluir</h2>
      </button>
    </div>

    <div class="bg-[#161B28] p-6 rounded-2xl border border-gray-800 shadow-xl">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
        <div>
          <label class="text-[9px] font-black text-gray-500 uppercase block mb-2">Buscar por ID Produto</label>
          <input type="text" id="filtroId" placeholder="Ex: P001" class="w-full px-4 py-2 bg-[#0B0F1A] border border-gray-700 rounded-xl text-white outline-none focus:ring-1 focus:ring-red-500 text-sm">
        </div>
        <div>
          <label class="text-[9px] font-black text-gray-500 uppercase block mb-2">Filtrar por Funcionário</label>
          <select id="filtroFunc" class="w-full px-4 py-2 bg-[#0B0F1A] border border-gray-700 rounded-xl text-white outline-none focus:ring-1 focus:ring-red-500 text-sm">
            <option value="">Todos</option>
          </select>
        </div>
        <div>
          <label class="text-[9px] font-black text-gray-500 uppercase block mb-2">Filtrar por Setor</label>
          <select id="filtroSetor" class="w-full px-4 py-2 bg-[#0B0F1A] border border-gray-700 rounded-xl text-white outline-none focus:ring-1 focus:ring-red-500 text-sm">
            <option value="">Todos</option>
          </select>
        </div>
      </div>

      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b border-gray-700">
              <th class="text-left py-3 px-4 text-[9px] font-black text-gray-500 uppercase tracking-wider">Data</th>
              <th class="text-left py-3 px-4 text-[9px] font-black text-gray-500 uppercase tracking-wider">ID Produto</th>
              <th class="text-left py-3 px-4 text-[9px] font-black text-gray-500 uppercase tracking-wider">Quantidade</th>
              <th class="text-left py-3 px-4 text-[9px] font-black text-gray-500 uppercase tracking-wider">Funcionário</th>
              <th class="text-left py-3 px-4 text-[9px] font-black text-gray-500 uppercase tracking-wider">Setor</th>
              <th class="text-left py-3 px-4 text-[9px] font-black text-gray-500 uppercase tracking-wider">Centro de Custo</th>
              <th class="text-center py-3 px-4 text-[9px] font-black text-gray-500 uppercase tracking-wider">Ações</th>
            </tr>
          </thead>
          <tbody id="tabelaSaidas">
            <tr>
              <td colspan="7" class="text-center py-8 text-gray-500">Carregando...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script type="module">
    import { db } from './database.js';
    lucide.createIcons();

    const carregarDados = () => {
      const banco = db.dados();
      const saidas = banco.movimentacoes.filter(m => m.tipo === 'SAIDA');
      const tabela = document.getElementById('tabelaSaidas');
      const filtroId = document.getElementById('filtroId').value.toLowerCase();
      const filtroFunc = document.getElementById('filtroFunc').value;
      const filtroSetor = document.getElementById('filtroSetor').value;

      const saidasFiltradas = saidas.filter(s => {
        const matchId = s.idProduto.toLowerCase().includes(filtroId);
        const matchFunc = !filtroFunc || s.funcionario === filtroFunc;
        const matchSetor = !filtroSetor || s.setor === filtroSetor;
        return matchId && matchFunc && matchSetor;
      });

      if (saidasFiltradas.length === 0) {
        tabela.innerHTML = '<tr><td colspan="7" class="text-center py-8 text-gray-500">Nenhuma saída registrada</td></tr>';
        return;
      }

      tabela.innerHTML = saidasFiltradas.map(s => `
        <tr class="border-b border-gray-800 hover:bg-[#1A1F2E] transition">
          <td class="py-3 px-4 text-gray-300">${s.data}</td>
          <td class="py-3 px-4 text-gray-300 font-mono">${s.idProduto}</td>
          <td class="py-3 px-4 text-red-400 font-bold">${s.quantidade}</td>
          <td class="py-3 px-4 text-gray-400">${s.funcionario}</td>
          <td class="py-3 px-4 text-gray-400">${s.setor}</td>
          <td class="py-3 px-4 text-gray-400">${s.centroCusto}</td>
          <td class="py-3 px-4 text-center">
            <button onclick="editarSaida(${s.id})" class="text-blue-400 hover:text-blue-300 transition mr-2" title="Editar">
              <i data-lucide="edit" class="w-4 h-4 inline"></i>
            </button>
            <button onclick="deletarSaida(${s.id})" class="text-red-400 hover:text-red-300 transition" title="Excluir">
              <i data-lucide="trash-2" class="w-4 h-4 inline"></i>
            </button>
          </td>
        </tr>
      `).join('');
      lucide.createIcons();
    };

    window.editarSaida = (id) => {
      sessionStorage.setItem('saida_id', id);
      window.location.href = 'saida-alterar.html';
    };

    window.deletarSaida = (id) => {
      sessionStorage.setItem('saida_id', id);
      window.location.href = 'saida-excluir.html';
    };

    const preencherFiltros = () => {
      const banco = db.dados();
      const saidas = banco.movimentacoes.filter(m => m.tipo === 'SAIDA');

      const funcionarios = [...new Set(saidas.map(s => s.funcionario))];
      const setores = [...new Set(saidas.map(s => s.setor))];

      const selectFunc = document.getElementById('filtroFunc');
      selectFunc.innerHTML = '<option value="">Todos</option>' + funcionarios.map(f => `<option value="${f}">${f}</option>`).join('');

      const selectSetor = document.getElementById('filtroSetor');
      selectSetor.innerHTML = '<option value="">Todos</option>' + setores.map(s => `<option value="${s}">${s}</option>`).join('');
    };

    document.getElementById('filtroId').addEventListener('input', carregarDados);
    document.getElementById('filtroFunc').addEventListener('change', carregarDados);
    document.getElementById('filtroSetor').addEventListener('change', carregarDados);

    preencherFiltros();
    carregarDados();
  </script>
</body>
</html>
