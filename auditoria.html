<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Auditoria | COMPESCAL</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#0B0F1A] text-gray-200 min-h-screen">
  <nav class="bg-[#161B28] p-3 flex items-center px-8 border-b border-gray-800 shadow-2xl">
    <button onclick="window.location.href='index.html'" class="mr-4 text-gray-400 hover:text-white transition"><i data-lucide="arrow-left" class="w-5 h-5"></i></button>
    <h1 class="font-bold text-[10px] uppercase tracking-widest text-green-500">Sistema de Auditoria - Rastreamento de Operações</h1>
  </nav>

  <main class="p-6 max-w-7xl mx-auto">
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
      <div class="bg-[#161B28] p-4 rounded-2xl border border-gray-800 shadow-xl">
        <div class="flex justify-between items-start">
          <div>
            <p class="text-[9px] font-black text-gray-500 uppercase mb-1">Total de Operações</p>
            <p id="totalOps" class="text-3xl font-bold text-white">0</p>
          </div>
          <div class="bg-blue-500/10 w-10 h-10 rounded-lg flex items-center justify-center">
            <i data-lucide="activity" class="text-blue-500 w-5 h-5"></i>
          </div>
        </div>
      </div>

      <div class="bg-[#161B28] p-4 rounded-2xl border border-gray-800 shadow-xl">
        <div class="flex justify-between items-start">
          <div>
            <p class="text-[9px] font-black text-gray-500 uppercase mb-1">Entradas</p>
            <p id="countEntrada" class="text-3xl font-bold text-green-400">0</p>
          </div>
          <div class="bg-green-500/10 w-10 h-10 rounded-lg flex items-center justify-center">
            <i data-lucide="arrow-down-to-dot" class="text-green-500 w-5 h-5"></i>
          </div>
        </div>
      </div>

      <div class="bg-[#161B28] p-4 rounded-2xl border border-gray-800 shadow-xl">
        <div class="flex justify-between items-start">
          <div>
            <p class="text-[9px] font-black text-gray-500 uppercase mb-1">Saídas</p>
            <p id="countSaida" class="text-3xl font-bold text-red-400">0</p>
          </div>
          <div class="bg-red-500/10 w-10 h-10 rounded-lg flex items-center justify-center">
            <i data-lucide="arrow-up-from-dot" class="text-red-500 w-5 h-5"></i>
          </div>
        </div>
      </div>

      <div class="bg-[#161B28] p-4 rounded-2xl border border-gray-800 shadow-xl">
        <div class="flex justify-between items-start">
          <div>
            <p class="text-[9px] font-black text-gray-500 uppercase mb-1">Hoje</p>
            <p id="countHoje" class="text-3xl font-bold text-yellow-400">0</p>
          </div>
          <div class="bg-yellow-500/10 w-10 h-10 rounded-lg flex items-center justify-center">
            <i data-lucide="calendar" class="text-yellow-500 w-5 h-5"></i>
          </div>
        </div>
      </div>
    </div>

    <div class="bg-[#161B28] p-6 rounded-2xl border border-gray-800 shadow-xl mb-6">
      <h2 class="text-sm font-bold text-white mb-4 uppercase tracking-wider">Filtros e Busca</h2>
      <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
        <div>
          <label class="text-[9px] font-black text-gray-500 uppercase block mb-2">Tipo de Operação</label>
          <select id="filtroTipo" class="w-full px-4 py-2 bg-[#0B0F1A] border border-gray-700 rounded-xl text-white outline-none focus:ring-1 focus:ring-green-500 text-sm">
            <option value="">Todas</option>
            <option value="ENTRADA">Entradas</option>
            <option value="SAIDA">Saídas</option>
            <option value="CADASTRO">Cadastros</option>
          </select>
        </div>
        <div>
          <label class="text-[9px] font-black text-gray-500 uppercase block mb-2">Produto</label>
          <input type="text" id="filtroProduto" placeholder="ID ou nome" class="w-full px-4 py-2 bg-[#0B0F1A] border border-gray-700 rounded-xl text-white outline-none focus:ring-1 focus:ring-green-500 text-sm">
        </div>
        <div>
          <label class="text-[9px] font-black text-gray-500 uppercase block mb-2">Data Inicial</label>
          <input type="date" id="filtroDataInicio" class="w-full px-4 py-2 bg-[#0B0F1A] border border-gray-700 rounded-xl text-white outline-none focus:ring-1 focus:ring-green-500 text-sm">
        </div>
        <div>
          <label class="text-[9px] font-black text-gray-500 uppercase block mb-2">Data Final</label>
          <input type="date" id="filtroDataFim" class="w-full px-4 py-2 bg-[#0B0F1A] border border-gray-700 rounded-xl text-white outline-none focus:ring-1 focus:ring-green-500 text-sm">
        </div>
      </div>
      <button onclick="resetarFiltros()" class="mt-4 px-4 py-2 bg-gray-700 text-white rounded-lg text-sm hover:bg-gray-600 transition">Limpar Filtros</button>
    </div>

    <div class="flex justify-between items-center mb-6">
      <h2 class="text-sm font-bold text-white uppercase tracking-wider">Ações Rápidas</h2>
      <button onclick="window.location.href='relatorios.html'" class="flex items-center gap-2 px-4 py-2 bg-yellow-600 text-white rounded-lg hover:bg-yellow-700 transition text-sm font-bold">
        <i data-lucide="bar-chart-3" class="w-4 h-4"></i> Ver Relatórios
      </button>
    </div>

    <div class="bg-[#161B28] p-6 rounded-2xl border border-gray-800 shadow-xl">
      <h2 class="text-sm font-bold text-white mb-4 uppercase tracking-wider">Log de Operações</h2>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b border-gray-700">
              <th class="text-left py-3 px-4 text-[9px] font-black text-gray-500 uppercase tracking-wider">Data/Hora</th>
              <th class="text-left py-3 px-4 text-[9px] font-black text-gray-500 uppercase tracking-wider">Tipo</th>
              <th class="text-left py-3 px-4 text-[9px] font-black text-gray-500 uppercase tracking-wider">Produto</th>
              <th class="text-center py-3 px-4 text-[9px] font-black text-gray-500 uppercase tracking-wider">Quantidade</th>
              <th class="text-left py-3 px-4 text-[9px] font-black text-gray-500 uppercase tracking-wider">Funcionário</th>
              <th class="text-left py-3 px-4 text-[9px] font-black text-gray-500 uppercase tracking-wider">Setor</th>
              <th class="text-center py-3 px-4 text-[9px] font-black text-gray-500 uppercase tracking-wider">Ação</th>
            </tr>
          </thead>
          <tbody id="tabelaAuditoria">
            <tr>
              <td colspan="7" class="text-center py-8 text-gray-500">Carregando...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script type="module">
    import { db } from './database.js';
    lucide.createIcons();

    const carregarAuditoria = () => {
      const banco = db.dados();
      const tipo = document.getElementById('filtroTipo').value;
      const produto = document.getElementById('filtroProduto').value.toLowerCase();
      const dataInicio = document.getElementById('filtroDataInicio').value;
      const dataFim = document.getElementById('filtroDataFim').value;

      let movimentos = banco.movimentacoes || [];

      if (tipo) {
        movimentos = movimentos.filter(m => m.tipo === tipo);
      }

      if (produto) {
        movimentos = movimentos.filter(m =>
          m.idProduto.toLowerCase().includes(produto)
        );
      }

      if (dataInicio || dataFim) {
        movimentos = movimentos.filter(m => {
          const dataMov = new Date(m.data.split(' ')[0].split('/').reverse().join('-'));
          const inicio = dataInicio ? new Date(dataInicio) : new Date('1900-01-01');
          const fim = dataFim ? new Date(dataFim) : new Date('2100-01-01');
          return dataMov >= inicio && dataMov <= fim;
        });
      }

      const tabela = document.getElementById('tabelaAuditoria');

      if (movimentos.length === 0) {
        tabela.innerHTML = '<tr><td colspan="7" class="text-center py-8 text-gray-500">Nenhuma operação encontrada</td></tr>';
        atualizarEstatisticas();
        return;
      }

      movimentos.sort((a, b) => {
        const dataA = new Date(a.data.split(' ')[0].split('/').reverse().join('-'));
        const dataB = new Date(b.data.split(' ')[0].split('/').reverse().join('-'));
        return dataB - dataA;
      });

      tabela.innerHTML = movimentos.map(m => {
        const tipoBg = m.tipo === 'ENTRADA' ? 'bg-green-500/10' : 'bg-red-500/10';
        const tipoColor = m.tipo === 'ENTRADA' ? 'text-green-400' : 'text-red-400';
        const tipoIcon = m.tipo === 'ENTRADA' ? 'arrow-down-to-dot' : 'arrow-up-from-dot';

        return `
          <tr class="border-b border-gray-800 hover:bg-[#1A1F2E] transition">
            <td class="py-3 px-4 text-gray-300 text-xs">${m.data}</td>
            <td class="py-3 px-4">
              <span class="${tipoBg} ${tipoColor} px-3 py-1 rounded-lg text-xs font-bold inline-flex items-center gap-1">
                <i data-lucide="${tipoIcon}" class="w-3 h-3"></i>
                ${m.tipo}
              </span>
            </td>
            <td class="py-3 px-4 text-gray-300 font-mono">${m.idProduto}</td>
            <td class="py-3 px-4 text-center font-bold">${m.quantidade}</td>
            <td class="py-3 px-4 text-gray-400">${m.funcionario}</td>
            <td class="py-3 px-4 text-gray-400">${m.setor}</td>
            <td class="py-3 px-4 text-center">
              <button onclick="verDetalhes(${m.id})" class="text-blue-400 hover:text-blue-300 transition" title="Ver detalhes">
                <i data-lucide="eye" class="w-4 h-4 inline"></i>
              </button>
            </td>
          </tr>
        `;
      }).join('');

      lucide.createIcons();
      atualizarEstatisticas();
    };

    const atualizarEstatisticas = () => {
      const banco = db.dados();
      const movimentos = banco.movimentacoes || [];
      const hoje = new Date().toLocaleDateString('pt-BR');

      const entradas = movimentos.filter(m => m.tipo === 'ENTRADA').length;
      const saidas = movimentos.filter(m => m.tipo === 'SAIDA').length;
      const hojeCount = movimentos.filter(m => m.data.startsWith(hoje)).length;

      document.getElementById('totalOps').innerText = movimentos.length;
      document.getElementById('countEntrada').innerText = entradas;
      document.getElementById('countSaida').innerText = saidas;
      document.getElementById('countHoje').innerText = hojeCount;
    };

    window.verDetalhes = (id) => {
      sessionStorage.setItem('auditoria_id', id);
      window.location.href = 'auditoria-detalhes.html';
    };

    window.resetarFiltros = () => {
      document.getElementById('filtroTipo').value = '';
      document.getElementById('filtroProduto').value = '';
      document.getElementById('filtroDataInicio').value = '';
      document.getElementById('filtroDataFim').value = '';
      carregarAuditoria();
    };

    document.getElementById('filtroTipo').addEventListener('change', carregarAuditoria);
    document.getElementById('filtroProduto').addEventListener('input', carregarAuditoria);
    document.getElementById('filtroDataInicio').addEventListener('change', carregarAuditoria);
    document.getElementById('filtroDataFim').addEventListener('change', carregarAuditoria);

    carregarAuditoria();
  </script>
</body>
</html>
