<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8"><title>Excluir Setor | COMPESCAL</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#0B0F1A] text-gray-200 min-h-screen">
  <nav class="bg-[#161B28] p-4 flex items-center px-8 border-b border-gray-800">
    <button onclick="window.location.href='cad-setores.html'" class="mr-4 text-gray-400 hover:text-white"><i data-lucide="arrow-left"></i></button>
    <h1 class="font-bold text-xs uppercase tracking-widest text-red-500">Remover Setor do Sistema</h1>
  </nav>

  <main class="p-8 max-w-2xl mx-auto">
    <div class="bg-[#161B28] rounded-3xl border border-gray-800 overflow-hidden shadow-2xl">
      <div class="p-6 bg-red-500/5 border-b border-gray-800">
        <p class="text-[10px] font-black uppercase text-red-500 tracking-tighter">Atenção: A exclusão é permanente</p>
      </div>
      <table class="w-full text-left text-sm">
        <tbody id="listaExclusao" class="divide-y divide-gray-800"></tbody>
      </table>
    </div>
  </main>

  <script type="module">
    import { db } from './database.js';
    import { UI } from './ui.js';
    lucide.createIcons();

    const render = () => {
      const dados = db.dados().setores || [];
      document.getElementById('listaExclusao').innerHTML = dados.map(s => `
        <tr class="hover:bg-red-500/5 transition-colors">
          <td class="px-6 py-4 font-mono text-xs text-gray-500">${s.id}</td>
          <td class="px-6 py-4 font-bold uppercase">${s.nome}</td>
          <td class="px-6 py-4 text-right">
            <button onclick="confirmarExclusao('${s.id}')" class="bg-red-600/10 hover:bg-red-600 text-red-500 hover:text-white p-2 rounded-lg transition-all">
              <i data-lucide="trash-2" class="w-4 h-4"></i>
            </button>
          </td>
        </tr>
      `).join('');
      lucide.createIcons();
    };

    window.confirmarExclusao = (id) => {
      if(confirm(`Tem certeza que deseja apagar o setor ${id}?`)) {
        const res = db.excluirRegistro('setores', id);
        UI.notificar(res.message, res.status);
        render();
      }
    };

    render();
  </script>
</body>
</html>
