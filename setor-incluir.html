<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Incluir Setor | COMPESCAL</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#0B0F1A] text-gray-200 min-h-screen">
  <nav class="bg-[#161B28] p-4 flex items-center px-8 border-b border-gray-800 shadow-2xl">
    <button onclick="window.location.href='cad-setores.html'" class="mr-4 text-gray-400 hover:text-white transition">
      <i data-lucide="arrow-left"></i>
    </button>
    <h1 class="font-bold text-xs uppercase tracking-widest text-green-500">Novo Cadastro de Setor</h1>
  </nav>

  <main class="p-8 max-w-xl mx-auto">
    <div class="bg-[#161B28] p-8 rounded-3xl border border-gray-800 shadow-2xl">
      <div class="mb-6 flex items-center gap-3">
        <div class="bg-green-500/10 p-2 rounded-lg">
          <i data-lucide="plus-circle" class="text-green-500 w-5 h-5"></i>
        </div>
        <h2 class="text-lg font-bold">Informações do Setor</h2>
      </div>

      <form id="formIncluir" class="space-y-5">
        <div>
          <label class="text-[9px] font-black text-gray-500 uppercase block mb-1">Sigla / ID do Setor</label>
          <input type="text" id="id" placeholder="Ex: MANUT, PROD, ADM" required 
            class="w-full px-4 py-3 bg-[#0B0F1A] border border-gray-700 rounded-xl text-white outline-none focus:ring-1 focus:ring-green-500 font-mono transition-all">
          <p class="text-[8px] text-gray-600 mt-1 italic">* Este código será usado para identificar o setor em outros cadastros.</p>
        </div>

        <div>
          <label class="text-[9px] font-black text-gray-500 uppercase block mb-1">Nome Descritivo</label>
          <input type="text" id="nome" placeholder="Ex: Manutenção Mecânica" required 
            class="w-full px-4 py-3 bg-[#0B0F1A] border border-gray-700 rounded-xl text-white outline-none focus:ring-1 focus:ring-green-500 transition-all">
        </div>

        <div class="pt-4 flex gap-3">
          <button type="button" onclick="window.location.href='cad-setores.html'" 
            class="flex-1 bg-transparent border border-gray-700 text-gray-400 font-bold py-4 rounded-xl uppercase text-[10px] tracking-widest hover:bg-gray-800 transition-all">
            Cancelar
          </button>
          <button type="submit" 
            class="flex-[2] bg-green-600 text-white font-black py-4 rounded-xl uppercase text-[10px] tracking-widest hover:bg-green-700 transition-all shadow-lg shadow-green-900/20">
            Confirmar Inclusão
          </button>
        </div>
      </form>
    </div>
  </main>

  <script type="module">
    import { db } from './database.js';
    import { UI } from './ui.js';
    lucide.createIcons();

    const form = document.getElementById('formIncluir');

    form.onsubmit = (e) => {
      e.preventDefault();

      const novoSetor = {
        id: document.getElementById('id').value.trim().toUpperCase(),
        nome: document.getElementById('nome').value.trim()
      };

      // Tenta adicionar no banco de dados
      const res = db.adicionarRegistro('setores', novoSetor);

      if (res.status === "success") {
        UI.notificar(res.message, 'success');
        // Pequeno delay para o usuário ver a notificação antes de voltar ao menu
        setTimeout(() => {
          window.location.href = 'cad-setores.html';
        }, 1500);
      } else {
        // Exibe erro se o ID já existir
        UI.notificar(res.message, 'error');
      }
    };
  </script>
</body>
</html>
