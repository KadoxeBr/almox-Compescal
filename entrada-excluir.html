<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8"><title>Estornar Entrada | COMPESCAL</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#0B0F1A] text-gray-200 min-h-screen">
  <nav class="bg-[#161B28] p-4 border-b border-gray-800">
    <button onclick="window.location.href='entrada.html'" class="text-gray-400 hover:text-white flex items-center gap-2"><i data-lucide="arrow-left"></i> <span class="text-[10px] uppercase font-black tracking-widest">Voltar</span></button>
  </nav>

  <main class="p-8 max-w-4xl mx-auto">
    <div class="bg-red-500/10 border border-red-500/20 p-4 rounded-2xl mb-6 flex items-center gap-4">
      <i data-lucide="alert-triangle" class="text-red-500"></i>
      <p class="text-xs text-red-200 uppercase font-bold tracking-tight">Cuidado: A exclusão estornará o saldo do produto no estoque.</p>
    </div>

    <div class="bg-[#161B28] rounded-3xl border border-gray-800 overflow-hidden shadow-2xl">
      <table class="w-full text-left text-sm">
        <thead class="bg-[#0B0F1A] text-[9px] uppercase text-gray-500 font-black">
          <tr>
            <th class="px-6 py-4">Data</th>
            <th class="px-6 py-4">Produto</th>
            <th class="px-6 py-4">Qtd</th>
            <th class="px-6 py-4">Fornecedor</th>
            <th class="px-6 py-4 text-right">Ação</th>
          </tr>
        </thead>
        <tbody id="listaEntradas" class="divide-y divide-gray-800"></tbody>
      </table>
    </div>
  </main>

  <script type="module">
    import { db } from './database.js';
    import { UI } from './ui.js';
    lucide.createIcons();

    const render = () => {
      const movimentacoes = db.dados().movimentacoes || [];
      const entradas = movimentacoes.filter(m => m.tipo === 'ENTRADA');
      
      document.getElementById('listaEntradas').innerHTML = entradas.map(m => `
        <tr class="hover:bg-red-500/5 transition-all">
          <td class="px-6 py-4 text-xs font-mono text-gray-500">${m.data}</td>
          <td class="px-6 py-4 font-bold text-xs uppercase">${m.idProduto}</td>
          <td class="px-6 py-4 font-black text-emerald-500">+${m.quantidade}</td>
          <td class="px-6 py-4 text-xs text-gray-400">${m.fornecedor}</td>
          <td class="px-6 py-4 text-right">
            <button onclick="estornar(${m.id})" class="bg-red-600/10 hover:bg-red-600 text-red-500 hover:text-white p-2 rounded-lg transition-all">
              <i data-lucide="trash-2" class="w-4 h-4"></i>
            </button>
          </td>
        </tr>
      `).join('');
      lucide.createIcons();
    };

    window.estornar = (id) => {
      if(confirm("Deseja realmente estornar esta entrada? O saldo do produto será reduzido.")) {
        const res = db.excluirMovimento(id);
        UI.notificar(res.message, res.status);
        render();
      }
    };

    render();
  </script>
</body>
</html>
