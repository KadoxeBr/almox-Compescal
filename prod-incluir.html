<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Novo Produto | COMPESCAL</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#0B0F1A] text-gray-200 min-h-screen">
  <nav class="bg-[#161B28] p-4 border-b border-gray-800 flex items-center shadow-2xl">
    <button onclick="window.location.href='index.html'" class="text-gray-400 hover:text-white flex items-center gap-2">
      <i data-lucide="arrow-left" class="w-4 h-4"></i> <span class="text-[10px] uppercase font-black tracking-widest">Voltar</span>
    </button>
  </nav>

  <main class="p-4 md:p-8 max-w-xl mx-auto">
    <header class="mb-8 text-center">
      <h2 class="text-2xl font-black text-white italic tracking-tighter uppercase leading-none">Novo Cadastro</h2>
      <p class="text-gray-500 text-[9px] uppercase tracking-widest mt-1">Inventário de Itens</p>
    </header>

    <form id="formProd" class="bg-[#161B28] p-6 md:p-8 rounded-[2rem] border border-gray-800 space-y-5 shadow-2xl">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="text-[9px] font-black text-gray-500 uppercase block mb-1 ml-2 tracking-widest">Código Sequencial</label>
          <input type="text" id="id" readonly class="w-full px-4 py-4 bg-[#0B0F1A] border border-gray-700 rounded-2xl text-emerald-500 font-mono text-sm outline-none">
        </div>
        <div>
          <label class="text-[9px] font-black text-gray-500 uppercase block mb-1 ml-2 tracking-widest">Unidade</label>
          <select id="un" required class="w-full px-4 py-4 bg-[#0B0F1A] border border-gray-700 rounded-2xl text-white outline-none appearance-none">
            <option value="UN">UN (Unidade)</option>
            <option value="KG">KG (Quilograma)</option>
            <option value="MT">MT (Metro)</option>
            <option value="L">L (Litro)</option>
            <option value="PC">PC (Peça)</option>
          </select>
        </div>
      </div>
      
      <div>
        <label class="text-[9px] font-black text-gray-500 uppercase block mb-1 ml-2 tracking-widest">Descrição Completa</label>
        <input type="text" id="desc" required placeholder="Ex: ROLAMENTO 6205 ZZ" 
               class="w-full px-4 py-4 bg-[#0B0F1A] border border-gray-700 rounded-2xl text-white outline-none focus:ring-1 focus:ring-blue-500 uppercase">
      </div>

      <button type="submit" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl uppercase text-[10px] tracking-[0.3em] active:scale-95 transition-all shadow-lg shadow-blue-900/20">
        Salvar no Banco
      </button>
    </form>
  </main>

  <script type="module">
    import { db } from './database.js';
    import { UI } from './ui.js';
    lucide.createIcons();
    
    // Gerador de Código COMP-0001
    const p = db.dados().produtos || [];
    let max = 0;
    p.forEach(x => { if(x.id.startsWith('COMP-')) { const n = parseInt(x.id.split('-')[1]); if(n > max) max = n; } });
    document.getElementById('id').value = `COMP-${(max+1).toString().padStart(4, '0')}`;

    document.getElementById('formProd').addEventListener('submit', (e) => {
      e.preventDefault();
      const res = db.adicionarRegistro('produtos', {
        id: document.getElementById('id').value,
        desc: document.getElementById('desc').value.toUpperCase(),
        un: document.getElementById('un').value,
        saldo: 0,
        estoqueMin: 0,
        data: new Date().toISOString()
      });
      if(res.status === "success") {
        UI.notificar("Produto Cadastrado!", "success");
        setTimeout(() => window.location.href='index.html', 1500);
      }
    });
  </script>
</body>
</html>
