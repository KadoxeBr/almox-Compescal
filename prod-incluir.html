<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8"><title>Novo Produto | COMPESCAL</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#0B0F1A] text-gray-200 min-h-screen">
  <nav class="bg-[#161B28] p-4 border-b border-gray-800 shadow-2xl">
    <button onclick="window.location.href='cad-produto.html'" class="text-gray-400 hover:text-white flex items-center gap-2"><i data-lucide="arrow-left"></i> <span class="text-[10px] uppercase font-black tracking-widest">Voltar</span></button>
  </nav>

  <main class="p-8 max-w-xl mx-auto">
    <form id="formProd" class="bg-[#161B28] p-8 rounded-3xl border border-gray-800 space-y-4 shadow-2xl">
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="text-[9px] font-black text-gray-500 uppercase block mb-1">Cód. Produto (Part Number)</label>
          <input type="text" id="id" required class="w-full px-4 py-3 bg-[#0B0F1A] border border-gray-700 rounded-xl text-white outline-none focus:ring-1 focus:ring-blue-500 font-mono">
        </div>
        <div>
          <label class="text-[9px] font-black text-gray-500 uppercase block mb-1">Unidade (UN, KG, MT)</label>
          <input type="text" id="un" required placeholder="Ex: UN" class="w-full px-4 py-3 bg-[#0B0F1A] border border-gray-700 rounded-xl text-white outline-none focus:ring-1 focus:ring-blue-500 uppercase">
        </div>
      </div>
      <div>
        <label class="text-[9px] font-black text-gray-500 uppercase block mb-1">Descrição Completa</label>
        <input type="text" id="desc" required class="w-full px-4 py-3 bg-[#0B0F1A] border border-gray-700 rounded-xl text-white outline-none focus:ring-1 focus:ring-blue-500">
      </div>
      <button type="submit" class="w-full bg-blue-600 text-white font-black py-4 rounded-xl uppercase text-[10px] tracking-widest hover:bg-blue-700 transition-all mt-4">Cadastrar no Estoque</button>
    </form>
  </main>

  <script type="module">
    import { db } from './database.js';
    import { UI } from './ui.js';
    lucide.createIcons();
    
    document.getElementById('formProd').addEventListener('submit', (e) => {
      e.preventDefault();
      const res = db.adicionarRegistro('produtos', {
        id: document.getElementById('id').value.toUpperCase(),
        desc: document.getElementById('desc').value,
        un: document.getElementById('un').value.toUpperCase(),
        saldo: 0, 
        ultimoCusto: 0
      });
      UI.notificar(res.message, res.status);
      if(res.status === "success") setTimeout(() => window.location.href='cad-produto.html', 1500);
    });
  </script>
</body>
</html>
