<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8"><title>Setores | COMPESCAL</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#0B0F1A] text-gray-200 min-h-screen">
  <nav class="bg-[#161B28] p-3 flex items-center px-8 border-b border-gray-800 shadow-2xl">
    <button onclick="window.location.href='cadastros.html'" class="mr-4 text-gray-400 hover:text-white transition"><i data-lucide="arrow-left" class="w-5 h-5"></i></button>
    <h1 class="font-bold text-[10px] uppercase tracking-widest text-indigo-500">Gestão de Setores</h1>
  </nav>

  <main class="p-6 max-w-2xl mx-auto">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      
      <button onclick="window.location.href='setor-incluir.html'" class="group bg-[#161B28] p-5 rounded-2xl border border-gray-800 hover:border-green-500/50 transition-all shadow-xl text-center">
        <div class="bg-green-500/10 w-10 h-10 rounded-xl flex items-center justify-center mx-auto mb-3 group-hover:scale-110 transition">
          <i data-lucide="plus-circle" class="text-green-500 w-5 h-5"></i>
        </div>
        <span class="block font-black uppercase text-[8px] tracking-widest text-gray-500">Novo</span>
        <h2 class="text-sm font-bold text-white mt-0.5">Incluir</h2>
      </button>

      <button onclick="window.location.href='setor-alterar.html'" class="group bg-[#161B28] p-5 rounded-2xl border border-gray-800 hover:border-blue-500/50 transition-all shadow-xl text-center">
        <div class="bg-blue-500/10 w-10 h-10 rounded-xl flex items-center justify-center mx-auto mb-3 group-hover:scale-110 transition">
          <i data-lucide="edit-3" class="text-blue-500 w-5 h-5"></i>
        </div>
        <span class="block font-black uppercase text-[8px] tracking-widest text-gray-500">Modificar</span>
        <h2 class="text-sm font-bold text-white mt-0.5">Alterar</h2>
      </button>

      <button onclick="window.location.href='setor-excluir.html'" class="group bg-[#161B28] p-5 rounded-2xl border border-gray-800 hover:border-red-500/50 transition-all shadow-xl text-center">
        <div class="bg-red-500/10 w-10 h-10 rounded-xl flex items-center justify-center mx-auto mb-3 group-hover:scale-110 transition">
          <i data-lucide="trash-2" class="text-red-500 w-5 h-5"></i>
        </div>
        <span class="block font-black uppercase text-[8px] tracking-widest text-gray-500">Remover</span>
        <h2 class="text-sm font-bold text-white mt-0.5">Excluir</h2>
      </button>

    </div>
  </main>

  <script>lucide.createIcons();</script>
</body>
</html>
