<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Entradas | COMPESCAL</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#0B0F1A] text-gray-200 min-h-screen">
  <nav class="bg-[#161B28] p-3 flex items-center px-4 md:px-8 border-b border-gray-800 shadow-2xl">
    <button onclick="window.location.href='index.html'" class="mr-4 text-gray-400 hover:text-white transition"><i data-lucide="arrow-left" class="w-5 h-5"></i></button>
    <h1 class="font-bold text-[9px] md:text-[10px] uppercase tracking-widest text-emerald-500">Gestão de Entradas</h1>
  </nav>

  <main class="p-4 md:p-6 max-w-2xl mx-auto w-full">
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 md:gap-4">
      <button onclick="window.location.href='entrada-incluir.html'" class="group bg-[#161B28] p-5 rounded-2xl border border-gray-800 hover:border-emerald-500/50 transition-all shadow-xl text-center">
        <div class="bg-emerald-500/10 w-10 h-10 rounded-xl flex items-center justify-center mx-auto mb-3 group-hover:scale-110 transition">
          <i data-lucide="file-down" class="text-emerald-500 w-5 h-5"></i>
        </div>
        <span class="block font-black uppercase text-[8px] tracking-widest text-gray-500">Nova Nota</span>
        <h2 class="text-sm font-bold text-white mt-0.5">Incluir</h2>
      </button>

      <button onclick="window.location.href='entrada-alterar.html'" class="group bg-[#161B28] p-5 rounded-2xl border border-gray-800 hover:border-blue-500/50 transition-all shadow-xl text-center">
        <div class="bg-blue-500/10 w-10 h-10 rounded-xl flex items-center justify-center mx-auto mb-3 group-hover:scale-110 transition">
          <i data-lucide="refresh-cw" class="text-blue-500 w-5 h-5"></i>
        </div>
        <span class="block font-black uppercase text-[8px] tracking-widest text-gray-500">Corrigir</span>
        <h2 class="text-sm font-bold text-white mt-0.5">Alterar</h2>
      </button>

      <button onclick="window.location.href='entrada-excluir.html'" class="group bg-[#161B28] p-5 rounded-2xl border border-gray-800 hover:border-red-500/50 transition-all shadow-xl text-center">
        <div class="bg-red-500/10 w-10 h-10 rounded-xl flex items-center justify-center mx-auto mb-3 group-hover:scale-110 transition">
          <i data-lucide="trash-2" class="text-red-500 w-5 h-5"></i>
        </div>
        <span class="block font-black uppercase text-[8px] tracking-widest text-gray-500">Remover</span>
        <h2 class="text-sm font-bold text-white mt-0.5">Excluir</h2>
      </button>
    </div>
  </main>
  <script>lucide.createIcons();</script>
</body>
</html>
