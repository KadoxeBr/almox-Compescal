<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Saída de Materiais | COMPESCAL</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .search-res { max-height: 250px; overflow-y: auto; z-index: 100; }
    .search-item:hover { background-color: #1e293b; cursor: pointer; }
    /* Ajuste para inputs no iOS não dar zoom */
    input, select { font-size: 16px !important; }
  </style>
</head>
<body class="bg-[#0B0F1A] text-gray-200 min-h-screen font-sans flex flex-col">

  <nav class="bg-[#161B28] p-3 md:p-4 border-b border-gray-800 flex items-center shadow-2xl sticky top-0 z-50 px-4 md:px-8">
    <button onclick="window.location.href='saida-listagem.html'" class="text-gray-400 hover:text-white flex items-center gap-2">
      <i data-lucide="arrow-left" class="w-5 h-5"></i>
      <span class="text-[9px] md:text-[10px] uppercase font-black tracking-widest hidden md:inline">Voltar</span>
    </button>
    <h1 class="ml-4 font-black text-[9px] md:text-[10px] uppercase tracking-[0.2em] text-orange-500">Requisição</h1>
  </nav>

  <main class="p-4 md:p-8 max-w-4xl mx-auto w-full">
    <header class="mb-6 text-center md:text-left">
     
      <p class="text-gray-500 text-[9px] uppercase tracking-[0.3em] font-bold mt-2">Saída de Insumos e Equipamentos</p>
    </header>

    <form id="formSaida" class="bg-[#161B28] p-5 md:p-8 rounded-[2rem] border border-gray-800 space-y-6 shadow-2xl">
      
      <div class="relative">
        <label class="text-[9px] font-black text-gray-500 uppercase block mb-2 ml-2 tracking-widest">1. Localizar Item (Cód ou Descrição)</label>
        <div class="relative">
            <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-600"></i>
            <input type="text" id="buscaProd" placeholder="Ex: COMP-0001 ou Filtro..." autocomplete="off"
                   class="w-full pl-12 pr-4 py-4 bg-[#0B0F1A] border border-gray-700 rounded-2xl text-white outline-none focus:ring-1 focus:ring-orange-500 transition-all font-medium">
        </div>
        <div id="lista" class="hidden absolute w-full mt-2 bg-[#161B28] border border-gray-700 rounded-2xl p-2 search-res shadow-2xl"></div>
        <input type="hidden" id="idProd" required>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-3 gap-2 md:gap-4 bg-[#0B0F1A]/50 p-3 md:p-4 rounded-3xl border border-gray-800/50">
        <div class="sm:col-span-1">
            <label class="text-[8px] md:text-[9px] font-black text-gray-500 uppercase block mb-1">Qtd</label>
            <input type="number" id="qtd" step="0.01" required placeholder="0.00"
                   class="w-full px-3 md:px-4 py-3 md:py-4 bg-[#0B0F1A] border border-gray-700 rounded-2xl text-white font-mono text-base md:text-lg outline-none focus:ring-1 focus:ring-orange-500">
        </div>
        <div class="sm:col-span-1">
            <label class="text-[8px] md:text-[9px] font-black text-gray-500 uppercase block mb-1">Unid</label>
            <input type="text" id="un" disabled class="w-full px-3 md:px-4 py-3 md:py-4 bg-gray-900 border border-gray-800 rounded-2xl text-center text-xs text-gray-500 font-bold uppercase" value="---">
        </div>
        <div class="sm:col-span-1">
          <label class="text-[8px] md:text-[9px] font-black text-gray-500 uppercase block mb-1">Saldo</label>
          <input type="text" id="saldo" disabled class="w-full px-3 md:px-4 py-3 md:py-4 bg-gray-900 border border-gray-800 rounded-2xl text-orange-500 font-black text-center text-lg md:text-xl font-mono" value="0.00">
        </div>
      </div>

      <div class="h-[1px] bg-gray-800"></div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 md:gap-4">
        <div>
          <label class="text-[8px] md:text-[9px] font-black text-gray-500 uppercase block mb-2">Funcionário</label>
          <select id="selectFunc" required class="w-full px-3 md:px-4 py-3 md:py-4 bg-[#0B0F1A] border border-gray-700 rounded-2xl text-white outline-none appearance-none focus:ring-1 focus:ring-orange-500 text-sm md:text-base"></select>
        </div>
        <div>
          <label class="text-[8px] md:text-[9px] font-black text-gray-500 uppercase block mb-2">Setor</label>
          <select id="selectSetor" required class="w-full px-3 md:px-4 py-3 md:py-4 bg-[#0B0F1A] border border-gray-700 rounded-2xl text-white outline-none appearance-none focus:ring-1 focus:ring-orange-500 text-sm md:text-base"></select>
        </div>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 md:gap-4">
        <div>
          <label class="text-[8px] md:text-[9px] font-black text-gray-500 uppercase block mb-2">Centro de Custo</label>
          <select id="selectCC" required class="w-full px-3 md:px-4 py-3 md:py-4 bg-[#0B0F1A] border border-gray-700 rounded-2xl text-white outline-none appearance-none focus:ring-1 focus:ring-orange-500 text-sm md:text-base"></select>
        </div>
        <div>
          <label class="text-[8px] md:text-[9px] font-black text-gray-500 uppercase block mb-2">Equipamento (Opcional)</label>
          <select id="selectMaq" class="w-full px-3 md:px-4 py-3 md:py-4 bg-[#0B0F1A] border border-gray-700 rounded-2xl text-white outline-none appearance-none border-dashed text-sm md:text-base"></select>
        </div>
      </div>

      <button type="submit" class="w-full bg-orange-600 text-white font-black py-4 md:py-5 rounded-2xl uppercase text-[9px] md:text-[10px] tracking-[0.3em] active:scale-95 transition-all shadow-lg shadow-orange-900/20 mt-4">
        Efetivar Saída
      </button>
    </form>
  </main>

  <script type="module">
    import { db } from './database.js';
    import { UI } from './ui.js';
    lucide.createIcons();

    const banco = db.dados();
    const inputBusca = document.getElementById('buscaProd');
    const lista = document.getElementById('lista');
    const hiddenId = document.getElementById('idProd');
    const displayUn = document.getElementById('un');
    const displaySaldo = document.getElementById('saldo');

    // Popular os Selects com os dados do banco (Funcionalidade Mantida)
    const carregarSelects = () => {
        const popular = (id, dados, label) => {
            const el = document.getElementById(id);
            el.innerHTML = `<option value="">SELECIONAR ${label}</option>`;
            dados.forEach(i => el.innerHTML += `<option value="${i.nome}">${i.nome}</option>`);
        };
        popular('selectFunc', banco.funcionarios || [], 'FUNCIONÁRIO');
        popular('selectSetor', banco.setores || [], 'SETOR');
        popular('selectCC', banco.centrosCusto || [], 'C. CUSTO');
        popular('selectMaq', banco.maquinas || [], 'MÁQUINA');
    };
    carregarSelects();

    // Busca Dinâmica Otimizada para Mobile
    inputBusca.addEventListener('input', e => {
        const termo = e.target.value.toUpperCase();
        if(termo.length < 1) { lista.classList.add('hidden'); return; }
        
        const filtrados = banco.produtos.filter(p => p.id.includes(termo) || p.desc.includes(termo));
        
        lista.innerHTML = filtrados.length ? filtrados.map(p => `
            <div class="search-item p-4 border-b border-gray-800 rounded-xl transition-all" 
                 onclick="window.selecionarItem('${p.id}', '${p.desc}', '${p.un}', ${p.saldo})">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-[10px] text-orange-500 font-mono font-bold">${p.id}</p>
                        <p class="text-xs text-white font-bold uppercase">${p.desc}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[9px] text-gray-500 uppercase font-black">Saldo</p>
                        <p class="text-xs font-mono font-bold text-white">${p.saldo.toFixed(2)}</p>
                    </div>
                </div>
            </div>`).join('') : '<p class="p-4 text-center text-xs text-gray-500">NENHUM ITEM ENCONTRADO</p>';
        
        lista.classList.remove('hidden');
    });

    window.selecionarItem = (id, desc, un, saldo) => {
        inputBusca.value = `${id} - ${desc}`;
        hiddenId.value = id;
        displayUn.value = un;
        displaySaldo.value = saldo.toFixed(2);
        lista.classList.add('hidden');
        inputBusca.classList.add('border-orange-500');
    };

    // Submit do Form com Validação de Saldo
    document.getElementById('formSaida').onsubmit = (e) => {
        e.preventDefault();
        
        const qtdInformada = parseFloat(document.getElementById('qtd').value);
        const saldoDisponivel = parseFloat(displaySaldo.value);

        if (!hiddenId.value) {
            UI.notificar("Selecione um produto da lista", "error");
            return;
        }

        if (qtdInformada > saldoDisponivel) {
            UI.notificar("ERRO: Saldo insuficiente!", "error");
            return;
        }

        const payload = {
            idProduto: hiddenId.value,
            quantidade: qtdInformada,
            funcionario: document.getElementById('selectFunc').value,
            setor: document.getElementById('selectSetor').value,
            centroCusto: document.getElementById('selectCC').value,
            maquina: document.getElementById('selectMaq').value,
            data: new Date().toISOString()
        };

        const res = db.registrarMovimento("SAIDA", payload);

        if (res.status === "success") {
            UI.notificar("Baixa realizada com sucesso!", "success");
            setTimeout(() => window.location.href = 'index.html', 1500);
        } else {
            UI.notificar(res.message, "error");
        }
    };

    // Fechar busca ao clicar fora
    document.addEventListener('click', e => {
        if(!inputBusca.contains(e.target) && !lista.contains(e.target)) lista.classList.add('hidden');
    });
  </script>
</body>
</html>
