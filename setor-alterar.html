<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8"><title>Alterar Setor | COMPESCAL</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#0B0F1A] text-gray-200 min-h-screen">
  <nav class="bg-[#161B28] p-4 flex items-center px-8 border-b border-gray-800">
    <button onclick="window.location.href='cad-setores.html'" class="mr-4 text-gray-400 hover:text-white"><i data-lucide="arrow-left"></i></button>
    <h1 class="font-bold text-xs uppercase tracking-widest text-blue-500">Alterar Registro de Setor</h1>
  </nav>

  <main class="p-8 max-w-xl mx-auto">
    <div class="bg-[#161B28] p-8 rounded-3xl border border-gray-800 shadow-2xl space-y-6">
      <div>
        <label class="text-[9px] font-black text-gray-500 uppercase block mb-1">Selecione o Setor para Editar</label>
        <select id="buscaSetor" class="w-full px-4 py-3 bg-[#0B0F1A] border border-gray-700 rounded-xl text-white outline-none focus:ring-1 focus:ring-blue-500"></select>
      </div>

      <hr class="border-gray-800">

      <form id="formAlterar" class="space-y-4 opacity-30 pointer-events-none transition-opacity">
        <div>
          <label class="text-[9px] font-black text-gray-500 uppercase block mb-1">ID (Não Alterável)</label>
          <input type="text" id="id" readonly class="w-full px-4 py-3 bg-gray-900 border border-gray-800 rounded-xl text-gray-500 font-mono">
        </div>
        <div>
          <label class="text-[9px] font-black text-gray-500 uppercase block mb-1">Novo Nome do Setor</label>
          <input type="text" id="nome" required class="w-full px-4 py-3 bg-[#0B0F1A] border border-gray-700 rounded-xl text-white outline-none focus:ring-1 focus:ring-blue-500">
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white font-black py-4 rounded-xl uppercase text-[10px] tracking-widest hover:bg-blue-700 transition-all">Salvar Alterações</button>
      </form>
    </div>
  </main>

  <script type="module">
    import { db } from './database.js';
    import { UI } from './ui.js';
    lucide.createIcons();

    const select = document.getElementById('buscaSetor');
    const form = document.getElementById('formAlterar');
    const inputId = document.getElementById('id');
    const inputNome = document.getElementById('nome');

    // Popular select
    const dados = db.dados().setores || [];
    select.innerHTML = '<option value="">Escolha um setor...</option>' + 
      dados.map(s => `<option value="${s.id}">${s.nome} (${s.id})</option>`).join('');

    // Ao selecionar, libera o formulário
    select.onchange = (e) => {
      const setor = dados.find(s => s.id === e.target.value);
      if(setor) {
        form.classList.remove('opacity-30', 'pointer-events-none');
        inputId.value = setor.id;
        inputNome.value = setor.nome;
      }
    };

    form.onsubmit = (e) => {
      e.preventDefault();
      const res = db.adicionarRegistro('setores', { id: inputId.value, nome: inputNome.value });
      UI.notificar(res.message, res.status);
      if(res.status === "success") setTimeout(() => window.location.href='cad-setores.html', 1500);
    };
  </script>
</body>
</html>
