<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8"><title>Incluir Funcionário | COMPESCAL</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#0B0F1A] text-gray-200 min-h-screen">
  <nav class="bg-[#161B28] p-4 border-b border-gray-800 shadow-2xl">
    <button onclick="window.location.href='cad-funcionario.html'" class="text-gray-400 hover:text-white flex items-center gap-2"><i data-lucide="arrow-left"></i> <span class="text-[10px] uppercase font-black tracking-widest">Voltar</span></button>
  </nav>

  <main class="p-8 max-w-xl mx-auto">
    <form id="formCad" class="bg-[#161B28] p-8 rounded-3xl border border-gray-800 space-y-4 shadow-2xl">
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="text-[9px] font-black text-gray-500 uppercase block mb-1">Matrícula</label>
          <input type="text" id="id" required class="w-full px-4 py-3 bg-[#0B0F1A] border border-gray-700 rounded-xl text-white outline-none focus:ring-1 focus:ring-green-500 font-mono">
        </div>
        <div>
          <label class="text-[9px] font-black text-gray-500 uppercase block mb-1">Setor</label>
          <select id="setor" required class="w-full px-4 py-3 bg-[#0B0F1A] border border-gray-700 rounded-xl text-white outline-none focus:ring-1 focus:ring-green-500"></select>
        </div>
      </div>
      <div>
        <label class="text-[9px] font-black text-gray-500 uppercase block mb-1">Nome Completo</label>
        <input type="text" id="nome" required class="w-full px-4 py-3 bg-[#0B0F1A] border border-gray-700 rounded-xl text-white outline-none focus:ring-1 focus:ring-green-500">
      </div>
      <button type="submit" class="w-full bg-green-600 text-white font-black py-4 rounded-xl uppercase text-[10px] tracking-widest hover:bg-green-700 transition-all mt-4">Confirmar Cadastro</button>
    </form>
  </main>

  <script type="module">
    import { db } from './database.js';
    import { UI } from './ui.js';
    lucide.createIcons();
    
    // Carregar setores do banco
    const select = document.getElementById('setor');
    const setores = db.dados().setores || [];
    select.innerHTML = '<option value="">Selecione um setor...</option>' + 
      setores.map(s => `<option value="${s.nome}">${s.nome}</option>`).join('');

    document.getElementById('formCad').addEventListener('submit', (e) => {
      e.preventDefault();
      const res = db.adicionarRegistro('funcionarios', {
        id: document.getElementById('id').value,
        nome: document.getElementById('nome').value,
        setor: document.getElementById('setor').value
      });
      UI.notificar(res.message, res.status);
      if(res.status === "success") setTimeout(() => window.location.href='cad-funcionario.html', 1500);
    });
  </script>
</body>
</html>
