<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Alterar Saída | COMPESCAL</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#0B0F1A] text-gray-200 min-h-screen">
  <nav class="bg-[#161B28] p-4 flex items-center px-8 border-b border-gray-800 shadow-2xl">
    <button onclick="window.location.href='saida-listagem.html'" class="mr-4 text-gray-400 hover:text-white transition"><i data-lucide="arrow-left"></i></button>
    <h1 class="font-bold text-xs uppercase tracking-widest text-blue-500">Alterar Saída de Material</h1>
  </nav>

  <main class="p-8 max-w-2xl mx-auto">
    <form id="formAlterarSaida" class="bg-[#161B28] p-8 rounded-3xl border border-gray-800 space-y-5 shadow-2xl">

      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="md:col-span-1">
          <label class="text-[9px] font-black text-gray-500 uppercase block mb-1">ID Produto</label>
          <input type="text" id="idProd" disabled class="w-full px-4 py-3 bg-gray-900 border border-gray-800 rounded-xl text-gray-500 font-mono">
        </div>
        <div class="md:col-span-1">
          <label class="text-[9px] font-black text-gray-500 uppercase block mb-1">Qtd / Unid.</label>
          <div class="flex gap-2">
            <input type="number" id="qtd" min="1" required class="w-full px-4 py-3 bg-[#0B0F1A] border border-gray-700 rounded-xl text-white outline-none">
            <input type="text" id="exibirUn" disabled class="w-16 bg-gray-900 border border-gray-800 rounded-xl text-center text-xs text-gray-500 font-bold" value="---">
          </div>
        </div>
        <div class="md:col-span-1">
          <label class="text-[9px] font-black text-gray-500 uppercase block mb-1">Saldo Atual</label>
          <input type="text" id="exibirSaldo" disabled class="w-full px-4 py-3 bg-gray-900 border border-gray-800 rounded-xl text-red-400 font-bold text-center">
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="text-[9px] font-black text-gray-500 uppercase block mb-1">Funcionário (Requisitante)</label>
          <input type="text" id="selectFunc" disabled class="w-full px-4 py-3 bg-gray-900 border border-gray-800 rounded-xl text-gray-500">
        </div>
        <div>
          <label class="text-[9px] font-black text-gray-500 uppercase block mb-1">Setor Destino</label>
          <input type="text" id="selectSetor" disabled class="w-full px-4 py-3 bg-gray-900 border border-gray-800 rounded-xl text-gray-500">
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="text-[9px] font-black text-gray-500 uppercase block mb-1">Centro de Custo</label>
          <input type="text" id="selectCC" disabled class="w-full px-4 py-3 bg-gray-900 border border-gray-800 rounded-xl text-gray-500">
        </div>
        <div>
          <label class="text-[9px] font-black text-gray-500 uppercase block mb-1">Máquina / Equipamento</label>
          <input type="text" id="selectMaq" disabled class="w-full px-4 py-3 bg-gray-900 border border-gray-800 rounded-xl text-gray-500">
        </div>
      </div>

      <div>
        <label class="text-[9px] font-black text-gray-500 uppercase block mb-1">Data da Saída</label>
        <input type="text" id="dataSaida" disabled class="w-full px-4 py-3 bg-gray-900 border border-gray-800 rounded-xl text-gray-500">
      </div>

      <button type="submit" class="w-full bg-blue-600 text-white font-black py-4 rounded-xl uppercase text-[10px] tracking-[0.3em] hover:bg-blue-700 transition-all mt-4 shadow-lg shadow-blue-900/20">Confirmar Alteração</button>
    </form>
  </main>

  <script type="module">
    import { db } from './database.js';
    import { UI } from './ui.js';
    lucide.createIcons();

    const saidaId = sessionStorage.getItem('saida_id');
    if (!saidaId) {
      window.location.href = 'saida-listagem.html';
    }

    const banco = db.dados();
    const saida = banco.movimentacoes.find(m => m.id == saidaId && m.tipo === 'SAIDA');

    if (!saida) {
      UI.notificar('Saída não encontrada!', 'error');
      setTimeout(() => window.location.href = 'saida-listagem.html', 1500);
    }

    const produto = banco.produtos.find(p => p.id === saida.idProduto);

    document.getElementById('idProd').value = saida.idProduto;
    document.getElementById('qtd').value = saida.quantidade;
    document.getElementById('exibirUn').value = produto ? produto.un : "---";
    document.getElementById('exibirSaldo').value = produto ? produto.saldo : "0";
    document.getElementById('selectFunc').value = saida.funcionario;
    document.getElementById('selectSetor').value = saida.setor;
    document.getElementById('selectCC').value = saida.centroCusto;
    document.getElementById('selectMaq').value = saida.maquina || "---";
    document.getElementById('dataSaida').value = saida.data;

    document.getElementById('formAlterarSaida').addEventListener('submit', (e) => {
      e.preventDefault();

      const novaQtd = parseFloat(document.getElementById('qtd').value);
      const diferencaQtd = novaQtd - saida.quantidade;

      if (produto && diferencaQtd !== 0) {
        if (diferencaQtd > 0 && produto.saldo < diferencaQtd) {
          UI.notificar('Estoque insuficiente para aumentar a saída!', 'error');
          return;
        }

        produto.saldo -= diferencaQtd;
      }

      saida.quantidade = novaQtd;
      db.salvar(banco);

      UI.notificar('Saída alterada com sucesso!', 'success');
      setTimeout(() => window.location.href = 'saida-listagem.html', 1500);
    });

    sessionStorage.removeItem('saida_id');
  </script>
</body>
</html>
